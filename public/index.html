<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Deepstream</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root {
  --black:  #080a0f;
  --deep:   #0d1017;
  --card:   #13181f;
  --rim:    #1e2530;
  --text:   #e2e8f0;
  --sub:    #64748b;
  --accent: #3b82f6;
  --glow:   rgba(59,130,246,.18);
  --live:   #22c55e;
  --red:    #ef4444;
  --r:      12px;
  --font:   'Space Grotesk', sans-serif;
  --mono:   'Space Mono', monospace;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--black);color:var(--text);font-family:var(--font);overflow:hidden}

/* ── Screens ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;transition:opacity .22s ease,transform .22s ease}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.98)}

/* ── Header ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;border-bottom:1px solid var(--rim);background:rgba(8,10,15,.9);backdrop-filter:blur(12px);flex-shrink:0;z-index:10}
.logo{font-family:var(--mono);font-size:1.1rem;font-weight:700;letter-spacing:-.5px;color:var(--text)}
.logo em{font-style:normal;color:var(--accent)}
.live-pill{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:.62rem;letter-spacing:2px;color:var(--live);border:1px solid rgba(34,197,94,.3);padding:4px 10px;border-radius:20px;background:rgba(34,197,94,.07)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--live);animation:blink 1.6s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ════ HOME ════ */
#home{background:var(--black)}
.home-body{flex:1;overflow-y:auto;padding:22px 24px;scrollbar-width:thin;scrollbar-color:var(--rim) transparent}
.home-body::-webkit-scrollbar{width:4px}
.home-body::-webkit-scrollbar-thumb{background:var(--rim);border-radius:2px}

.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-label{font-family:var(--mono);font-size:.63rem;letter-spacing:1.5px;color:var(--sub);text-transform:uppercase;margin-right:2px}
#chips{display:flex;gap:6px;flex-wrap:wrap}

.chip{padding:5px 13px;border-radius:20px;font-size:.72rem;font-weight:600;cursor:pointer;border:1px solid var(--rim);background:transparent;color:var(--sub);transition:all .13s;white-space:nowrap;font-family:var(--font)}
.chip:hover{color:var(--text);border-color:#2e3a4a}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 16px var(--glow)}

.search-wrap{position:relative;margin-left:auto}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;opacity:.4}
#searchInput{background:var(--card);border:1px solid var(--rim);border-radius:8px;padding:6px 12px 6px 32px;font-family:var(--font);font-size:.78rem;color:var(--text);width:180px;outline:none;transition:border-color .15s,width .2s}
#searchInput:focus{border-color:var(--accent);width:220px}
#searchInput::placeholder{color:var(--sub)}

.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-family:var(--mono);font-size:.63rem;letter-spacing:2px;text-transform:uppercase;color:var(--sub)}
.section-count{font-family:var(--mono);font-size:.63rem;color:var(--sub)}

.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px}

/* Channel card */
.ch-card{background:var(--card);border:1px solid var(--rim);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .15s,transform .15s,box-shadow .15s;position:relative}
.ch-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.5),0 0 0 1px var(--accent)}
.ch-card:hover .ch-play-overlay{opacity:1}

.ch-thumb{width:100%;aspect-ratio:16/9;background:#0a0e14;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.ch-thumb img{width:60px;height:60px;object-fit:contain;filter:drop-shadow(0 2px 10px rgba(0,0,0,.6))}
.no-logo{width:48px;height:48px;border-radius:10px;background:var(--rim);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:1.1rem;font-weight:700;color:var(--accent)}

.ch-play-overlay{position:absolute;inset:0;background:rgba(59,130,246,.13);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.ch-play-btn{width:44px;height:44px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(59,130,246,.55)}
.ch-play-btn svg{margin-left:3px}

.ch-meta{padding:10px 12px 12px;border-top:1px solid var(--rim)}
.ch-group-tag{font-family:var(--mono);font-size:.57rem;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent);margin-bottom:4px;opacity:.85}
.ch-name{font-size:.84rem;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.ch-lang-tag{margin-top:6px;display:inline-block;font-size:.6rem;font-family:var(--mono);padding:2px 7px;border-radius:4px;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);color:#93c5fd}

.empty-state{display:none;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;gap:12px;text-align:center}
.empty-state.show{display:flex}
.empty-state svg{opacity:.2}
.empty-state p{color:var(--sub);font-size:.85rem}

/* ════ PLAYER ════ */
#player{background:#000}

.player-header{display:flex;align-items:center;padding:0 20px;height:56px;border-bottom:1px solid var(--rim);background:rgba(8,10,15,.92);backdrop-filter:blur(12px);flex-shrink:0;gap:14px;z-index:10}
.back-btn{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--rim);color:var(--text);font-family:var(--font);font-size:.8rem;font-weight:600;padding:6px 13px 6px 10px;border-radius:8px;cursor:pointer;transition:border-color .12s,background .12s;flex-shrink:0}
.back-btn:hover{border-color:var(--accent);background:var(--rim)}
.player-ch-info{flex:1;min-width:0}
.player-ch-name{font-weight:700;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-ch-meta{font-size:.7rem;color:var(--sub);margin-top:2px}

.video-body{flex:1;display:flex;flex-direction:column;background:#000;overflow:hidden}
.video-wrap{position:relative;width:100%;flex:1;background:#000}
video{width:100%;height:100%;display:block;object-fit:contain}

.vid-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(0,0,0,.75);transition:opacity .2s}
.vid-overlay.gone{opacity:0;pointer-events:none}
.spinner{width:42px;height:42px;border:3px solid rgba(59,130,246,.18);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.vid-overlay p{font-size:.8rem;color:#94a3b8;font-family:var(--mono)}
.err-icon{font-size:2.2rem;line-height:1}
.err-msg{color:#fca5a5;font-size:.78rem;text-align:center;max-width:300px;line-height:1.5}
.retry-btn{background:var(--card);border:1px solid var(--rim);color:var(--text);font-family:var(--font);font-size:.78rem;padding:7px 18px;border-radius:8px;cursor:pointer;transition:border-color .12s;margin-top:4px}
.retry-btn:hover{border-color:var(--accent)}

@media(max-width:600px){
  .home-body{padding:12px 14px}
  .ch-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:9px}
  #searchInput{width:120px}
  #searchInput:focus{width:150px}
}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen" id="home">
  <div class="header">
    <div class="logo">Deep<em>stream</em></div>
    <div class="live-pill"><div class="live-dot"></div>LIVE</div>
  </div>
  <div class="home-body">
    <div class="filter-row">
      <span class="filter-label">Filter</span>
      <div id="chips"></div>
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7" stroke="#64748b" stroke-width="1.8"/>
          <path d="M16.5 16.5l4 4" stroke="#64748b" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <input id="searchInput" type="text" placeholder="Search channels…"/>
      </div>
    </div>
    <div class="section-head">
      <span class="section-title">All Channels</span>
      <span class="section-count" id="chCount">Loading…</span>
    </div>
    <div class="ch-grid" id="chGrid"></div>
    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
        <path d="M9.5 9.5l5 5M14.5 9.5l-5 5" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="9" stroke="#64748b" stroke-width="1.5"/>
      </svg>
      <p>No channels match your search.</p>
    </div>
  </div>
</div>

<!-- PLAYER -->
<div class="screen hidden" id="player">
  <div class="player-header">
    <button class="back-btn" id="backBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
        <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Channels
    </button>
    <div class="player-ch-info">
      <div class="player-ch-name" id="playerTitle"></div>
      <div class="player-ch-meta" id="playerMeta"></div>
    </div>
    <div class="live-pill"><div class="live-dot"></div>LIVE</div>
  </div>
  <div class="video-body">
    <div class="video-wrap">
      <video id="vid" controls playsinline></video>
      <div class="vid-overlay" id="loadOverlay">
        <div class="spinner"></div>
        <p>Connecting to stream…</p>
      </div>
      <div class="vid-overlay gone" id="errOverlay">
        <div class="err-icon">⚠️</div>
        <div class="err-msg" id="errMsg">Stream unavailable.</div>
        <button class="retry-btn" id="retryBtn">Try again</button>
      </div>
    </div>
  </div>
</div>

<script>
let allChannels = [], currentGroup = "All", currentChannel = null, hls = null;

const homeScreen   = document.getElementById("home");
const playerScreen = document.getElementById("player");
const chGrid       = document.getElementById("chGrid");
const chCount      = document.getElementById("chCount");
const chipsEl      = document.getElementById("chips");
const searchInput  = document.getElementById("searchInput");
const emptyState   = document.getElementById("emptyState");
const vid          = document.getElementById("vid");
const loadOverlay  = document.getElementById("loadOverlay");
const errOverlay   = document.getElementById("errOverlay");
const errMsg       = document.getElementById("errMsg");
const playerTitle  = document.getElementById("playerTitle");
const playerMeta   = document.getElementById("playerMeta");

// ── Navigation ────────────────────────────────────────────────────────────
function showPlayer(ch) {
  currentChannel = ch;
  playerTitle.textContent = ch.title;
  playerMeta.textContent  = [ch.group, ch.lang].filter(Boolean).join("  ·  ");
  homeScreen.classList.add("hidden");
  playerScreen.classList.remove("hidden");
  startStream(ch);
}

function showHome() {
  stopStream();
  playerScreen.classList.add("hidden");
  homeScreen.classList.remove("hidden");
}

document.getElementById("backBtn").onclick = showHome;
document.getElementById("retryBtn").onclick = () => currentChannel && startStream(currentChannel);

// ── M3U parser ────────────────────────────────────────────────────────────
async function loadPlaylist() {
  const res  = await fetch("/api/playlist");
  const text = await res.text();
  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const out = [];

  for (let i = 0; i < lines.length; i++) {
    if (!lines[i].startsWith("#EXTINF")) continue;
    const info    = lines[i];
    const urlLine = lines[i + 1] || "";
    if (!urlLine || urlLine.startsWith("#")) continue;

    const attr = k => { const m = info.match(new RegExp(k + '="([^"]*)"')); return m?.[1] ?? ""; };

    const nameMatch = info.match(/,(.+)$/);
    const full  = nameMatch ? nameMatch[1].trim() : "Stream";
    const pipe  = full.indexOf("|");
    const lang  = pipe > -1 ? full.slice(0, pipe).trim() : "";
    const title = pipe > -1 ? full.slice(pipe + 1).trim() : full;

    // "https://...m3u8|User-Agent=...&Referer=..."
    const pipePos   = urlLine.indexOf("|");
    const rawUrl    = (pipePos > -1 ? urlLine.slice(0, pipePos) : urlLine).trim();
    const headerStr = pipePos > -1 ? urlLine.slice(pipePos + 1) : "";

    const headers = {};
    headerStr.split("&").forEach(p => {
      const eq = p.indexOf("=");
      if (eq > -1) headers[p.slice(0, eq).trim()] = p.slice(eq + 1).trim();
    });

    out.push({ id: out.length, title, lang, logo: attr("tvg-logo"), group: attr("group-title") || "General", rawUrl, headers });
  }
  return out;
}

// ── Player ────────────────────────────────────────────────────────────────
function proxyUrl(rawUrl, headers) {
  return `/api/proxy?url=${encodeURIComponent(rawUrl)}&h=${encodeURIComponent(JSON.stringify(headers))}`;
}

function stopStream() {
  if (hls) { hls.destroy(); hls = null; }
  vid.src = "";
}

function startStream(ch) {
  stopStream();
  loadOverlay.classList.remove("gone");
  errOverlay.classList.add("gone");

  const src = proxyUrl(ch.rawUrl, ch.headers);

  if (Hls.isSupported()) {
    hls = new Hls({ debug: false });
    hls.loadSource(src);
    hls.attachMedia(vid);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      loadOverlay.classList.add("gone");
      vid.play().catch(() => {});
    });
    hls.on(Hls.Events.ERROR, (_, d) => {
      if (d.fatal) {
        loadOverlay.classList.add("gone");
        errMsg.textContent = `Stream error (${d.details}). The link may have expired.`;
        errOverlay.classList.remove("gone");
      }
    });
  } else if (vid.canPlayType("application/vnd.apple.mpegurl")) {
    vid.src = src;
    loadOverlay.classList.add("gone");
    vid.play().catch(() => {});
  } else {
    loadOverlay.classList.add("gone");
    errMsg.textContent = "HLS is not supported in this browser.";
    errOverlay.classList.remove("gone");
  }
}

// ── UI ────────────────────────────────────────────────────────────────────
function renderGrid() {
  const q = searchInput.value.trim().toLowerCase();
  const filtered = allChannels.filter(ch => {
    const inGroup = currentGroup === "All" || ch.group === currentGroup;
    const inSearch = !q || ch.title.toLowerCase().includes(q) || ch.lang.toLowerCase().includes(q);
    return inGroup && inSearch;
  });

  chCount.textContent = `${filtered.length} stream${filtered.length !== 1 ? "s" : ""}`;
  emptyState.classList.toggle("show", filtered.length === 0);
  chGrid.innerHTML = "";

  filtered.forEach(ch => {
    const card = document.createElement("div");
    card.className = "ch-card";
    const initial = ch.title.replace(/^(ENG|HIN|TAM|TEL|BEN|KAN|MAL|MAR)\s*[\|·\-]?\s*/i, "").trim()[0]?.toUpperCase() || "?";

    card.innerHTML = `
      <div class="ch-thumb">
        ${ch.logo
          ? `<img src="${ch.logo}" alt="" onerror="this.parentNode.innerHTML='<div class=no-logo>${initial}</div>'">`
          : `<div class="no-logo">${initial}</div>`}
        <div class="ch-play-overlay">
          <div class="ch-play-btn">
            <svg width="16" height="16" viewBox="0 0 24 24"><path d="M6 4l14 8-14 8V4z" fill="#fff"/></svg>
          </div>
        </div>
      </div>
      <div class="ch-meta">
        <div class="ch-group-tag">${ch.group}</div>
        <div class="ch-name">${ch.title}</div>
        <span class="ch-lang-tag">${ch.lang || "MULTI"}</span>
      </div>`;

    card.onclick = () => showPlayer(ch);
    chGrid.appendChild(card);
  });
}

function buildChips() {
  const groups = ["All", ...new Set(allChannels.map(c => c.group))];
  chipsEl.innerHTML = "";
  groups.forEach(g => {
    const btn = document.createElement("button");
    btn.className = "chip" + (g === "All" ? " on" : "");
    btn.textContent = g;
    btn.onclick = () => {
      chipsEl.querySelectorAll(".chip").forEach(c => c.classList.remove("on"));
      btn.classList.add("on");
      currentGroup = g;
      renderGrid();
    };
    chipsEl.appendChild(btn);
  });
}

searchInput.addEventListener("input", renderGrid);

// ── Boot ──────────────────────────────────────────────────────────────────
(async () => {
  try {
    allChannels = await loadPlaylist();
    buildChips();
    renderGrid();
  } catch (e) {
    chCount.textContent = "Error";
    chGrid.innerHTML = `<p style="color:#64748b;font-size:.85rem;grid-column:1/-1;padding:50px 0;text-align:center">Could not load channels: ${e.message}</p>`;
  }
})();
</script>
</body>
  </html>
